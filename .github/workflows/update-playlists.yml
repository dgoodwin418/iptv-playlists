name: Update IPTV Playlists

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run playlist generator
        run: python update.py

      - name: Commit updated playlists
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add playlists/*.m3u domain-report.md
          git commit -m "Update IPTV playlists" || echo "No changes to commit"
          git push
