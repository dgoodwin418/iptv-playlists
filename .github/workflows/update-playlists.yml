name: Update IPTV Playlists

on:
  schedule:
    - cron: "0 10 * * *"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-iptv-playlists
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run playlist generator
        run: python update.py

      - name: Show generated files
        run: |
          find playlists -type f -maxdepth 2 | sort
          echo
          echo "Provider playlists:"
          find playlists/by-provider -type f -name "*.m3u" | wc -l

      - name: Commit updated playlists
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            playlists \
            provider-report.md \
            provider-notes.json

          if git diff --cached --quiet; then
            echo "No playlist changes to commit."
          else
            git commit -m "Update IPTV playlists"
            git push
          fi
