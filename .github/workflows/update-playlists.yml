name: Update IPTV Playlists

on:
  schedule:
    - cron: "0 10 * * *"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-iptv-playlists
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run playlist generator
        run: python update.py

      - name: Show update summary
        run: |
          echo "Provider playlists:"
          find playlists/by-provider -type f -name "*.m3u" | wc -l

          echo "Generated reports:"
          find reports -type f | sort

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            playlists \
            reports \
            provider-notes.json \
            provider-report.md

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update IPTV playlists and provider reports"
            git push
          fi
